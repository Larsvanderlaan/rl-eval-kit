seed: 1729
replications: 20
gamma: 0.95
horizon: 80
n_actions: 3
sample_sizes: [250, 500, 1000, 2000, 5000]
state_dimensions: [6]
coverage_settings: [moderate]
reward_noise_settings: [0.2]
baseline_learners: [random_feature_fqe, neural_fqe, regularized_bellman, saddle_point_bellman, ensemble_fqe]
calibration_protocols: [cross, split, no_split]
calibrators: [linear, histogram, isotonic, isotonic_histogram]
calibration_targets: [value_bellman]
importance_weight_scheme: action_ratio
importance_weight_clip: 20.0
normalize_importance_weights: true
value_calibration_iterations: 4
split_fractions: [0.5, 0.6, 0.7, 0.8, 0.9]
test_transitions: 3000
diagnostic_test_transitions: 5000
true_q_rollouts_per_state: 2
calibration_error_bins: 50
calibration_error_min_bin_size: 50
calibration_error_folds: 5
initial_eval_states: 3000
oracle_rollouts: 3000
policy_shift: {good: 0.15, moderate: 0.75, severe: 1.35, extrapolation: 1.7}
calibrator_params: {n_bins: 12, bin_strategy: quantile, min_bin_size: 25}
split_comparators: [fine_tuning_all_layers, offset_correction, residual_correction, regularized_toward_first_stage]
learner_params:
  random_feature_fqe: {n_components: 192, bandwidth: 0.7, ridge: 0.001, n_iters: 30}
  neural_fqe: {hidden_dims: [96, 96], n_iters: 18, epochs_per_iter: 6, batch_size: 128, lr: 0.001, weight_decay: 0.0001, target_tau: 0.2, device: cpu}
  regularized_bellman: {n_components: 192, bandwidth: 0.7, ridge: 0.01}
  saddle_point_bellman: {n_components: 192, bandwidth: 0.7, ridge: 0.01, critic_ridge: 0.01}
  ensemble_fqe: {n_members: 5, n_components: 128, bandwidth: 0.7, ridge: 0.001, n_iters: 25}
