seed: 41001
replications: 10
gamma: 0.95
horizon: 60
n_actions: 3
sample_sizes: [1000]
state_dimensions: [8]
coverage_settings: [moderate]
reward_noise_settings: [0.2]
transition_noise: 0.25
test_transitions: 2000
diagnostic_test_transitions: 5000
true_q_rollouts_per_state: 2
calibration_error_bins: 50
calibration_error_min_bin_size: 50
calibration_error_folds: 5
initial_eval_states: 2000
oracle_rollouts: 2000
policy_shift: {good: 0.15, moderate: 0.75, severe: 1.35, extrapolation: 1.7}
environment_tier: nonlinear_synthetic
misspecification: none
reference_shift_scale: 0.5
shifted_initial_eval_states: true
baseline_learners: [random_feature_fqe, neural_fqe, regularized_bellman, saddle_point_bellman, ensemble_fqe]
calibration_protocols: [cross, split, no_split]
calibrators: [linear, histogram, isotonic, isotonic_histogram]
calibration_targets: [value_bellman]
importance_weight_scheme: action_ratio
importance_weight_clip: 20.0
normalize_importance_weights: true
value_calibration_iterations: 4
cross_folds: 5
split_fractions: [0.8]
split_comparators: [offset_correction, residual_correction]
calibrator_params: {n_bins: 10, bin_strategy: quantile, min_bin_size: 20, value_calibration_iterations: 4}
comparator_params: {n_components: 64, ridge: 0.01}
learner_params:
  random_feature_fqe: {n_components: 128, bandwidth: 0.7, ridge: 0.001, n_iters: 25}
  neural_fqe: {hidden_dims: [64, 64], n_iters: 12, epochs_per_iter: 5, batch_size: 128, lr: 0.001, weight_decay: 0.0001, target_tau: 0.2, device: cpu}
  regularized_bellman: {n_components: 128, bandwidth: 0.7, ridge: 0.01}
  saddle_point_bellman: {n_components: 128, bandwidth: 0.7, ridge: 0.01, critic_ridge: 0.01}
  ensemble_fqe: {n_members: 5, n_components: 96, bandwidth: 0.7, ridge: 0.001, n_iters: 20}
