output_subdir:
  debug: focused_debug
  paper: focused_paper

validation:
  name: well_specified_debug
  config: configs/well_specified_debug.yaml
  gate:
    bias_threshold: 2.0
    mse_threshold: 8.0
    degradation_factor: 4.0
    degradation_abs_tolerance: 0.25
    sample_trend_abs_tolerance: 0.05
  mode_overrides:
    debug: &focused_debug
      replications: 1
      sample_sizes: [80]
      state_dimensions: [3]
      coverage_settings: [moderate]
      reward_noise_settings: [0.02]
      test_transitions: 60
      diagnostic_test_transitions: 80
      true_q_rollouts_per_state: 1
      true_v_rollouts_per_state: 1
      calibration_error_bins: 6
      calibration_error_min_bin_size: 5
      calibration_error_folds: 2
      initial_eval_states: 60
      oracle_rollouts: 50
      cross_folds: 2
      calibration_protocols: [cross]
      calibrators: [linear, isotonic]
      calibration_targets: [value_bellman]
      split_fractions: []
      split_comparators: []
      learner_params:
        linear_fqe: {feature_type: linear, ridge: 0.0001, n_iters: 6}
        random_feature_fqe: {n_components: 12, bandwidth: 0.7, ridge: 0.01, n_iters: 3}
        neural_fqe: {hidden_dims: [8], n_iters: 1, epochs_per_iter: 1, batch_size: 16, lr: 0.002, device: cpu}
    paper: &focused_paper
      replications: 50
      sample_sizes: [1000]
      state_dimensions: [6]
      coverage_settings: [moderate]
      reward_noise_settings: [0.1]
      test_transitions: 1500
      diagnostic_test_transitions: 5000
      true_q_rollouts_per_state: 2
      true_v_rollouts_per_state: 2
      calibration_error_bins: 50
      calibration_error_min_bin_size: 50
      calibration_error_folds: 5
      initial_eval_states: 1500
      oracle_rollouts: 1500
      cross_folds: 5
      calibration_protocols: [cross]
      calibrators: [linear, isotonic]
      calibration_targets: [value_bellman]
      split_fractions: []
      split_comparators: []

suites:
  - name: model_misspecification_sweep
    config: configs/model_misspecification_sweep.yaml
    mode_overrides:
      debug:
        <<: *focused_debug
        misspecification_settings: [affine, monotone_distortion]
        baseline_learners: [linear_fqe_misspecified, random_feature_fqe_restricted]
        learner_params:
          linear_fqe: {feature_type: linear, ridge: 0.001, n_iters: 6}
          random_feature_fqe: {n_components: 12, bandwidth: 0.9, ridge: 0.02, n_iters: 4}
        learner_variants:
          linear_fqe_misspecified:
            base_learner: linear_fqe
            learner_quality_regime: misspecified
            calibration_difficulty: model_misspecified
            main_figure_role: main
            params: {feature_type: linear, n_iters: 6, ridge: 0.001}
          random_feature_fqe_restricted:
            base_learner: random_feature_fqe
            learner_quality_regime: misspecified
            calibration_difficulty: model_misspecified
            main_figure_role: main
            params: {n_components: 12, bandwidth: 1.2, ridge: 0.02, n_iters: 4}
      paper:
        <<: *focused_paper
        misspecification_settings: [affine, monotone_distortion]
        baseline_learners: [linear_fqe_misspecified, random_feature_fqe_restricted]
        policy_shift: {good: 0.15, moderate: 0.75, severe: 1.35, extrapolation: 1.7}
        reference_shift_scale: 0.5
        shifted_initial_eval_states: true
        calibrator_params: {n_bins: 10, bin_strategy: quantile, min_bin_size: 20, value_calibration_iterations: 4}
        learner_params:
          linear_fqe: {feature_type: linear, ridge: 0.001, n_iters: 30}
          random_feature_fqe: {n_components: 80, bandwidth: 0.9, ridge: 0.02, n_iters: 30}
        learner_variants:
          linear_fqe_misspecified:
            base_learner: linear_fqe
            learner_quality_regime: misspecified
            calibration_difficulty: model_misspecified
            main_figure_role: main
            params: {feature_type: linear, n_iters: 30, ridge: 0.001}
          random_feature_fqe_restricted:
            base_learner: random_feature_fqe
            learner_quality_regime: misspecified
            calibration_difficulty: model_misspecified
            main_figure_role: main
            params: {n_components: 20, bandwidth: 1.4, ridge: 0.02, n_iters: 25}

  - name: undertraining_sweep
    config: configs/undertraining_sweep.yaml
    mode_overrides:
      debug:
        <<: *focused_debug
        gamma: 0.97
        horizon: 16
        misspecification: finite_iteration_scale
        baseline_learners: [random_feature_fqe_iter2, neural_fqe_iter1]
        value_calibration_iterations: 2
        calibrator_params: {n_bins: 4, bin_strategy: quantile, min_bin_size: 5, value_calibration_iterations: 2}
        learner_params:
          random_feature_fqe: {feature_type: linear, ridge: 0.001, n_components: 12, bandwidth: 0.7, n_iters: 4}
          neural_fqe: {hidden_dims: [8], n_iters: 1, epochs_per_iter: 1, batch_size: 16, lr: 0.002, target_tau: 0.0, device: cpu}
        learner_variants:
          random_feature_fqe_iter2:
            base_learner: random_feature_fqe
            learner_quality_regime: under_iterated
            calibration_difficulty: finite_iteration_bias
            main_figure_role: main
            params: {n_iters: 2}
          neural_fqe_iter1:
            base_learner: neural_fqe
            learner_quality_regime: under_iterated
            calibration_difficulty: finite_iteration_bias
            main_figure_role: main
            params: {hidden_dims: [8], n_iters: 1, epochs_per_iter: 1, bootstrap_on_first_iter: false, target_tau: 0.0}
      paper:
        <<: *focused_paper
        gamma: 0.985
        horizon: 120
        state_dimensions: [4]
        reward_noise_settings: [0.05]
        transition_noise: 0.04
        misspecification: finite_iteration_scale
        reference_shift_scale: 0.15
        shifted_initial_eval_states: true
        policy_shift: {good: 0.10, moderate: 0.45, severe: 1.15, extrapolation: 1.7}
        baseline_learners: [random_feature_fqe_iter2, neural_fqe_iter1]
        value_calibration_iterations: 8
        calibrator_params: {n_bins: 10, bin_strategy: quantile, min_bin_size: 20, value_calibration_iterations: 8}
        learner_params:
          random_feature_fqe: {feature_type: linear, ridge: 0.0005, n_components: 64, bandwidth: 0.7, n_iters: 35}
          neural_fqe: {hidden_dims: [24], n_iters: 1, epochs_per_iter: 1, batch_size: 128, lr: 0.001, weight_decay: 0.0001, target_tau: 0.0, device: cpu}
        learner_variants:
          random_feature_fqe_iter2:
            base_learner: random_feature_fqe
            learner_quality_regime: under_iterated
            calibration_difficulty: finite_iteration_bias
            main_figure_role: main
            params: {n_iters: 2}
          neural_fqe_iter1:
            base_learner: neural_fqe
            learner_quality_regime: under_iterated
            calibration_difficulty: finite_iteration_bias
            main_figure_role: main
            params: {hidden_dims: [24], n_iters: 1, epochs_per_iter: 1, bootstrap_on_first_iter: false, target_tau: 0.0}

  - name: mechanism_distortion_sweep
    config: configs/mechanism_distortion_sweep.yaml
    mode_overrides:
      debug:
        <<: *focused_debug
        misspecification: well_specified_linear
        baseline_learners: [random_feature_fqe_affine_distorted, random_feature_fqe_monotone_saturation_distorted]
        learner_params:
          random_feature_fqe: {feature_type: linear, ridge: 0.0001, n_components: 12, bandwidth: 0.7, n_iters: 3}
        calibrator_params: {n_bins: 4, bin_strategy: quantile, min_bin_size: 5, value_calibration_iterations: 2}
      paper:
        <<: *focused_paper
        gamma: 0.90
        horizon: 30
        sample_sizes: [400]
        state_dimensions: [6]
        reward_noise_settings: [0.0]
        transition_noise: 0.0
        test_transitions: 500
        initial_eval_states: 500
        oracle_rollouts: 500
        misspecification: well_specified_linear
        environment_tier: mechanism_diagnostic
        policy_shift: {good: 0.15, moderate: 0.55, severe: 1.35, extrapolation: 1.7}
        baseline_learners: [random_feature_fqe_affine_distorted, random_feature_fqe_monotone_saturation_distorted]
        calibrator_params: {n_bins: 12, bin_strategy: quantile, min_bin_size: 25, value_calibration_iterations: 4}
        learner_params:
          random_feature_fqe: {feature_type: linear, ridge: 0.0001, n_iters: 8}
