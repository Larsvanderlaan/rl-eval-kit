seed: 62011
replications: 10
gamma: 0.95
horizon: 70
n_actions: 3
sample_sizes: [1000]
state_dimensions: [8]
coverage_settings: [moderate]
reward_noise_settings: [0.15]
transition_noise: 0.20
test_transitions: 2000
diagnostic_test_transitions: 5000
true_q_rollouts_per_state: 2
calibration_error_bins: 50
calibration_error_min_bin_size: 50
calibration_error_folds: 5
interval_bootstrap_reps: 200
initial_eval_states: 2000
oracle_rollouts: 2000
policy_shift: {good: 0.15, moderate: 0.70, severe: 1.35, extrapolation: 1.7}
environment_tier: bellman_incomplete
misspecification: bellman_incomplete
reference_shift_scale: 0.6
shifted_initial_eval_states: true
baseline_learners:
  - linear_fqe_restricted
  - random_feature_fqe_low_capacity
  - random_feature_fqe_medium_capacity
  - random_feature_fqe_well_tuned
  - neural_fqe_small
  - neural_fqe_well_tuned
  - regularized_bellman_low_capacity
calibration_protocols: [cross, split, no_split]
calibrators: [linear, isotonic, isotonic_histogram]
calibration_targets: [value_bellman]
importance_weight_scheme: action_ratio
importance_weight_clip: 20.0
normalize_importance_weights: true
value_calibration_iterations: 5
cross_folds: 5
split_fractions: [0.8]
split_comparators: []
calibrator_params: {n_bins: 10, bin_strategy: quantile, min_bin_size: 20, value_calibration_iterations: 5}
learner_params:
  random_feature_fqe: {n_components: 80, bandwidth: 0.8, ridge: 0.02, n_iters: 30}
  linear_fqe: {feature_type: linear, ridge: 0.001, n_iters: 30}
  neural_fqe: {hidden_dims: [64, 64], n_iters: 12, epochs_per_iter: 4, batch_size: 128, lr: 0.001, weight_decay: 0.0001, target_tau: 0.2, device: cpu}
  regularized_bellman: {n_components: 128, bandwidth: 0.7, ridge: 0.01}
learner_variants:
  linear_fqe_restricted:
    base_learner: linear_fqe
    learner_quality_regime: misspecified
    calibration_difficulty: bellman_incomplete
    main_figure_role: main
    params: {feature_type: linear, n_iters: 40, ridge: 0.001}
  random_feature_fqe_low_capacity:
    base_learner: random_feature_fqe
    learner_quality_regime: misspecified
    calibration_difficulty: bellman_incomplete
    main_figure_role: main
    params: {n_components: 16, n_iters: 40, ridge: 0.01}
  random_feature_fqe_medium_capacity:
    base_learner: random_feature_fqe
    learner_quality_regime: misspecified
    calibration_difficulty: bellman_incomplete
    main_figure_role: appendix
    params: {n_components: 40, n_iters: 40, ridge: 0.015}
  random_feature_fqe_well_tuned:
    base_learner: random_feature_fqe
    learner_quality_regime: well_tuned
    calibration_difficulty: already_well_calibrated
    main_figure_role: main
    params: {n_components: 80, bandwidth: 0.8, n_iters: 35, ridge: 0.02}
  neural_fqe_small:
    base_learner: neural_fqe
    learner_quality_regime: misspecified
    calibration_difficulty: bellman_incomplete
    main_figure_role: appendix
    params: {hidden_dims: [12], n_iters: 8, epochs_per_iter: 2, weight_decay: 0.01}
  neural_fqe_well_tuned:
    base_learner: neural_fqe
    learner_quality_regime: well_tuned
    calibration_difficulty: already_well_calibrated
    main_figure_role: main
  regularized_bellman_low_capacity:
    base_learner: regularized_bellman
    learner_quality_regime: misspecified
    calibration_difficulty: bellman_incomplete
    main_figure_role: appendix
    params: {n_components: 24, ridge: 0.05}
