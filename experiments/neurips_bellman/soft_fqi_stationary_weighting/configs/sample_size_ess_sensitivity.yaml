name: sample_size_ess_sensitivity
base_seed: 20260501
output_dir: results/sample_size_ess_sensitivity
checkpoint_every: 10

grid: {n_x: 25, n_y: 25}
environment: {process_noise: 0.075, teleport_prob: 0.002}
algorithm:
  gamma: 0.97
  tau_final: 0.001
  n_iters: 60
  ridge: 0.0001
  metrics_stride: 5
  value_iteration_tol: 0.0000000001
  value_iteration_max_iter: 16000
  anneal_taus: [0.2, 0.05, 0.01, 0.003, 0.001]
behavior: {decoy_tau: 0.02}
regimes:
  shift_27: {target: 0.73, decoy: 0.17, uniform: 0.10}
  shift_45: {target: 0.55, decoy: 0.35, uniform: 0.10}
  shift_72: {target: 0.28, decoy: 0.62, uniform: 0.10}
data: {n_samples: 5000}
weights:
  gamma_weights: [0.95]
  stabilize_oracle: true
  n_state_centers: 36
  bandwidth_scale: 0.65
  ridge_primal: 0.00001
  ridge_dual: 0.00001
  normalization_penalty: 10.0
  min_weight: 0.00000001
  max_weight: 25.0
  clip_quantile: 0.99
  target_ess_fraction: 0.25
stages:
  - name: sample_n1000
    learners: [linear]
    regimes: [shift_27, shift_45, shift_72]
    schedules: [direct]
    methods: [unweighted, oracle, estimated_g0p95]
    data: {n_samples: 1000}
    seeds: {start: 0, stop: 100}
  - name: sample_n2500
    learners: [linear]
    regimes: [shift_27, shift_45, shift_72]
    schedules: [direct]
    methods: [unweighted, oracle, estimated_g0p95]
    data: {n_samples: 2500}
    seeds: {start: 0, stop: 100}
  - name: sample_n5000
    learners: [linear]
    regimes: [shift_27, shift_45, shift_72]
    schedules: [direct]
    methods: [unweighted, oracle, estimated_g0p95]
    data: {n_samples: 5000}
    seeds: {start: 0, stop: 100}
  - name: sample_n10000
    learners: [linear]
    regimes: [shift_27, shift_45, shift_72]
    schedules: [direct]
    methods: [unweighted, oracle, estimated_g0p95]
    data: {n_samples: 10000}
    seeds: {start: 0, stop: 100}
