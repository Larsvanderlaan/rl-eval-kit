name: paper_main_200_stabilized
base_seed: 20260501
output_dir: results/paper_main_200_stabilized
checkpoint_every: 25

grid: {n_x: 25, n_y: 25}
environment: {process_noise: 0.075, teleport_prob: 0.002}
algorithm:
  gamma: 0.97
  tau_final: 0.001
  n_iters: 60
  ridge: 0.0001
  metrics_stride: 5
  value_iteration_tol: 0.0000000001
  value_iteration_max_iter: 16000
  anneal_taus: [0.2, 0.05, 0.01, 0.003, 0.001]
behavior: {decoy_tau: 0.02}
regimes:
  on_policy: {target: 0.999, decoy: 0.00, uniform: 0.001}
  mild_shift: {target: 0.55, decoy: 0.35, uniform: 0.10}
  moderate_shift: {target: 0.20, decoy: 0.70, uniform: 0.10}
data: {n_samples: 5000}
weights:
  gamma_weights: [0.95]
  stabilize_oracle: true
  n_state_centers: 36
  bandwidth_scale: 0.65
  ridge_primal: 0.00001
  ridge_dual: 0.00001
  normalization_penalty: 10.0
  min_weight: 0.00000001
  max_weight: 25.0
  clip_quantile: 0.99
  target_ess_fraction: 0.25
neural:
  hidden_dims: [48, 48]
  batch_size: 512
  epochs_per_iter: 2
  learning_rate: 0.0005
  weight_decay: 0.0001
  target_update_tau: 0.25
  grad_clip_norm: 5.0
  device: cpu
stages:
  - name: stage2_weights
    learners: [linear]
    regimes: [on_policy, mild_shift, moderate_shift]
    schedules: [direct, annealed]
    methods: [unweighted, oracle, estimated]
    gamma_weights: [0.95]
    seeds: {start: 0, stop: 200}
